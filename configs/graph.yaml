model:
  provider: qwen_cloud
  name: qwen-plus
  api_key_env: API_KEY_Qwen
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

paths:
  cases_dir: data/cases
  run_root: var/runs
  logs_dir: var/logs

runtime:
  save_logs: true
  max_rounds: 4
  max_controller_steps: 3
  default_task_type: normal
