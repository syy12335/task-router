# controller 后训练 runbook 的单一配置源。
# SFT 专属参数放在 `sft`，GRPO/verl 更新参数放在 `update`，
# 共享的模型、数据和运行时参数放在各自 section。
seed: 42

# 训练轮次标识。`previous_round_id` 用来读取上一轮接纳的反馈样本。
round:
  id: round_0001
  previous_round_id: ""

# notebook/CLI runbook 的安全开关。长任务和外部 API 调用都显式放在这里，
# 这样重复执行 cell 时行为更可控。
run:
  sft: true
  # export 只生成 verl 数据和请求；full_update 才真正启动 verl。
  grpo_export_only: true
  grpo_full_update: true
  # holdout rollout 需要本地 OpenAI-compatible 推理端点。
  predict_holdout: false
  # evaluate 会用已有 predictions 调用 teacher/regression judge。
  evaluate: true
  annotate_queue: true

# 生成产物默认写到 var/runs。路径可使用 {round_id} 占位。
outputs:
  sft_dir: var/runs/task_router_graph_train/sft/{round_id}
  sft_merged_dir: var/runs/task_router_graph_train/sft/{round_id}/merged
  grpo_dir: var/runs/task_router_graph_train/grpo/{round_id}
  eval_dir: var/runs/task_router_graph_train/eval/{round_id}
  holdout_predictions: var/runs/task_router_graph_train/predictions/{round_id}_holdout_predictions.jsonl

# GRPO 后可选的 holdout rollout。它和 verl 内部 rollout 分开：
# 这里请求已部署的模型端点，并写出 predictions 供 teacher 打分。
holdout_inference:
  base_url: http://127.0.0.1:30000/v1
  api_key_env: SGLANG_API_KEY
  model: qwen35-4b
  timeout_sec: 60
  max_tokens: 512
  temperature: 0.0
  max_samples: 30

# teacher 后端配置。顶层 teacher 是默认值；按角色配置的 block
# 会覆盖默认值，用于 reward judge 或 regression evaluation。
teacher:
  mode: online
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-flash
  api_key_env: API_KEY_Qwen
  timeout_sec: 60
  max_batch_size: 4
  max_tokens: 2048
  temperature: 0.0
  allow_missing_api_key: false
  ranking_path: ""

  reward_judge: &reward_judge
    mode: online
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-flash
    api_key_env: API_KEY_Qwen
    timeout_sec: 60
    rubric_id: controller_grpo_pairwise_v1
    max_batch_size: 4
    max_tokens: 2048
    temperature: 0.0
    format_retry_count: 2
    allow_missing_api_key: false
    ranking_path: ""

# verl/SGLang 消费的 GRPO 候选生成参数。
rollout:
  backend: sglang
  num_candidates: 4
  temperature: 0.8
  top_p: 0.95
  top_k: -1
  max_tokens: 512
  gpu_memory_utilization: 0.5
  tensor_model_parallel_size: 1
  data_parallel_size: 1
  max_num_batched_tokens: 8192
  max_num_seqs: 256
  load_format: auto

# GRPO/verl 更新参数。不要把这里的 learning_rate 复用给 SFT：
# SFT 有独立的 `sft.learning_rate`。
update:
  backend: verl
  adv_estimator: grpo
  total_epochs: 1
  train_batch_size: 8
  val_batch_size: 4
  learning_rate: 2.0e-6
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  ref_log_prob_micro_batch_size_per_gpu: 1
  rollout_log_prob_micro_batch_size_per_gpu: 1
  n_gpus_per_node: 1
  nnodes: 1
  actor_use_torch_compile: true
  enable_activation_offload: false
  actor_param_offload: false
  actor_optimizer_offload: false
  ref_param_offload: false
  ref_optimizer_offload: false
  logger:
    - console
  val_before_train: false
  test_freq: -1
  save_freq: -1
  resume_mode: disable
  use_kl_loss: true
  norm_adv_by_std_in_grpo: true

# SFT 和 GRPO 共用的 policy model。当前 GRPO/SGLang direct update
# 使用 full-rank 权重同步，因此这条路径保持 model.lora_rank=0。
model:
  path: /model/default/Qwen3-0.6B/Qwen3-0.6B
  # 可选的本地更大模型：
  # path: /model/default/Qwen3.5-4B
  trust_remote_code: false
  # 当前 verl/SGLang runtime 的 direct weight sync 在 full-rank update 下更稳定。
  lora_rank: 0
  lora_alpha: 0
  lora_dropout: 0.05
  use_remove_padding: false
  attn_implementation: eager
  target_modules:
    - q_proj
    - v_proj

# 共享的 prompt/response 长度限制，以及 verl dataset 字段映射。
data:
  max_prompt_length: 2048
  max_response_length: 512
  dataloader_num_workers: 0
  prompt_key: prompt
  reward_fn_key: data_source
  return_raw_chat: true
  filter_overlong_prompts: false

controller_state_view:
  compress: false
  compress_target_tokens: null

# SFT 专属参数。这里训练 GRPO 前的 adapter/merged model。
# 除非故意让 SFT 很慢，否则这里的 LR 应高于 GRPO。
sft:
  total_epochs: 5
  learning_rate: 2.0e-4
  export_merged_model: true
  max_seq_length: 1024
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bf16: true
  fp16: false
  gradient_checkpointing: true
  torch_empty_cache_steps: 1
  nproc_per_node: 1

# feedback loop 策略：控制 teacher 标注的 badcase 如何进入后续轮次。
feedback:
  auto_sft_confidence_threshold: 0.85
  regression_reserve_ratio: 0.2
  regression_reserve_min: 1
  eval_ratio: 0.2

debug:
  allow_oracle_file_teacher: false

# 本地调试用的额外产物开关。正常训练保持 false。
audit:
  export_rollout_preview: false
  export_teacher_preview: false
