seed: 42

round:
  id: round_0001
  previous_round_id: ""

run:
  sft: true
  grpo_export_only: true
  grpo_full_update: true
  predict_holdout: false
  evaluate: true
  annotate_queue: true

outputs:
  sft_dir: var/runs/task_router_graph_train/sft/{round_id}
  sft_merged_dir: var/runs/task_router_graph_train/sft/{round_id}/merged
  grpo_dir: var/runs/task_router_graph_train/grpo/{round_id}
  eval_dir: var/runs/task_router_graph_train/eval/{round_id}
  holdout_predictions: var/runs/task_router_graph_train/predictions/{round_id}_holdout_predictions.jsonl

holdout_inference:
  base_url: http://127.0.0.1:30000/v1
  api_key_env: SGLANG_API_KEY
  model: qwen35-4b
  timeout_sec: 60
  max_tokens: 512
  temperature: 0.0
  max_samples: null

teacher:
  mode: online
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-flash
  api_key_env: API_KEY_Qwen
  timeout_sec: 60
  max_batch_size: 4
  max_tokens: 2048
  temperature: 0.0
  allow_missing_api_key: false
  ranking_path: ""

  reward_judge: &reward_judge
    mode: online
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-flash
    api_key_env: API_KEY_Qwen
    timeout_sec: 60
    rubric_id: controller_grpo_pairwise_v1
    max_batch_size: 4
    max_tokens: 2048
    temperature: 0.0
    format_retry_count: 2
    allow_missing_api_key: false
    ranking_path: ""

rollout:
  backend: sglang
  num_candidates: 4
  temperature: 0.8
  top_p: 0.95
  top_k: -1
  max_tokens: 512
  gpu_memory_utilization: 0.5
  tensor_model_parallel_size: 1
  data_parallel_size: 1
  max_num_batched_tokens: 8192
  max_num_seqs: 256
  load_format: auto

update:
  backend: verl
  adv_estimator: grpo
  total_epochs: 1
  train_batch_size: 8
  val_batch_size: 4
  learning_rate: 2.0e-4
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  ref_log_prob_micro_batch_size_per_gpu: 1
  rollout_log_prob_micro_batch_size_per_gpu: 1
  n_gpus_per_node: 1
  nnodes: 1
  actor_use_torch_compile: true
  enable_activation_offload: false
  actor_param_offload: false
  actor_optimizer_offload: false
  ref_param_offload: false
  ref_optimizer_offload: false
  logger:
    - console
  val_before_train: false
  test_freq: -1
  save_freq: -1
  resume_mode: disable
  use_kl_loss: true
  norm_adv_by_std_in_grpo: true

model:
  path: /model/default/Qwen3-0.6B/Qwen3-0.6B
  # Optional larger local model:
  # path: /model/default/Qwen3.5-4B
  trust_remote_code: false
  # SGLang direct weight sync in the current verl/SGLang runtime is stable for full-rank updates.
  lora_rank: 0
  lora_alpha: 0
  lora_dropout: 0.05
  use_remove_padding: false
  attn_implementation: eager
  target_modules:
    - q_proj
    - v_proj

data:
  max_prompt_length: 2048
  max_response_length: 512
  dataloader_num_workers: 0
  prompt_key: prompt
  reward_fn_key: data_source
  return_raw_chat: true
  filter_overlong_prompts: false

controller_state_view:
  compress: false
  compress_target_tokens: null

sft:
  total_epochs: 5
  export_merged_model: true
  max_seq_length: 1024
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bf16: true
  fp16: false
  gradient_checkpointing: true
  torch_empty_cache_steps: 1
  nproc_per_node: 1

feedback:
  auto_sft_confidence_threshold: 0.85
  regression_reserve_ratio: 0.2
  regression_reserve_min: 1
  eval_ratio: 0.2

debug:
  allow_oracle_file_teacher: false

audit:
  export_rollout_preview: false
  export_teacher_preview: false
